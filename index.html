    const AGENTS = DATA.meta.agents;
const ITEMS = (DATA.items || []).slice().sort((a,b)=> ((b.ajout||b.date)+b.date).localeCompare((a.ajout||a.date)+a.date));
const PRIOS = {
  haute: "Priorité haute", moyenne: "Priorité moyenne",
  surveillance: "À surveiller", cas: "Cas pédagogique"
};

const DAY = 86400000;
const now = new Date();
function isRecent(d){ if(!d) return false; const t = new Date(d+"T00:00:00"); return (now - t) <= 7*DAY && (now - t) >= -DAY; }
// Affiche la date à la granularité réellement connue : "" -> non daté, "AAAA" -> année,
// "AAAA-MM" -> MM/AAAA, "AAAA-MM-JJ" -> JJ/MM/AAAA. On n'invente jamais un jour ou un mois.
function fmtDate(d){
  if(!d) return "non daté";
  const p = d.split("-");
  if(p.length===1) return p[0];
  if(p.length===2) return p[1]+"/"+p[0];
  return p[2]+"/"+p[1]+"/"+p[0];
}
// Date d'ajout la plus récente présente dans le feed = "le dernier run".
// Le fil d'actualité n'affiche que ces éléments ; tout le reste vit dans les Archives.
const LATEST_AJOUT = ITEMS.reduce((mx,it)=>{ const a=it.ajout||it.date; return a>mx?a:mx; }, "");
function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

const state = { view:"feed", q:"", agents:new Set(), prios:new Set() };

// header
document.getElementById("sub").textContent = "9 agents · " + ITEMS.length + " éléments";
document.getElementById("maj").textContent = "Mise à jour : " + fmtDate(DATA.meta.derniere_maj);

// agent chips
const ac = document.getElementById("agentchips");
Object.entries(AGENTS).forEach(([key,a])=>{
  const c = document.createElement("span");
  c.className = "chip"; c.dataset.agent = key;
  c.innerHTML = '<span class="dot" style="background:'+a.couleur+'"></span>'+esc(a.label);
  c.onclick = ()=>{ toggle(state.agents, key, c, a.couleur); render(); };
  ac.appendChild(c);
});
// prio chips
const pc = document.getElementById("priochips");
Object.entries(PRIOS).forEach(([key,label])=>{
  const c = document.createElement("span");
  c.className = "chip priochip"; c.dataset.prio = key; c.textContent = label;
  c.onclick = ()=>{ toggle(state.prios, key, c, null); render(); };
  pc.appendChild(c);
});
function toggle(set, key, el, color){
  if(set.has(key)){ set.delete(key); el.classList.remove("on"); el.style.background=""; }
  else { set.add(key); el.classList.add("on"); if(color) el.style.background=color; }
}

document.getElementById("search").addEventListener("input", e=>{ state.q = e.target.value.toLowerCase().trim(); render(); });

document.querySelectorAll(".tab").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    state.view = t.dataset.view;
    document.getElementById("view-feed").classList.toggle("hidden", state.view!=="feed");
    document.getElementById("view-archive").classList.toggle("hidden", state.view!=="archive");
  };
});

function matches(it){
  if(state.agents.size && !state.agents.has(it.agent)) return false;
  if(state.prios.size && !state.prios.has(it.priorite)) return false;
  if(state.q){
    const hay = (it.titre+" "+it.resume+" "+(it.source_label||"")+" "+(it.impact||"")+" "+(it.opportunite||"")).toLowerCase();
    if(!hay.includes(state.q)) return false;
  }
  return true;
}

function cardHTML(it){
  const a = AGENTS[it.agent] || {label:it.agent, couleur:"#888"};
  const rec = isRecent(it.ajout || it.date);
  return '<div class="card'+(rec?' recent':'')+'">'
    + '<div class="row1">'
      + '<span class="badge" style="background:'+a.couleur+'">'+esc(a.label)+'</span>'
      + '<span class="prio '+it.priorite+'">'+esc(PRIOS[it.priorite]||it.priorite)+'</span>'
      + (rec?'<span class="recent-tag">Récent</span>':'')
      + '<span class="date">'+fmtDate(it.date)+'</span>'
    + '</div>'
    + '<h3>'+esc(it.titre)+'</h3>'
    + '<div class="resume">'+esc(it.resume)+'</div>'
    + (it.statut?'<div class="stat">Statut : '+esc(it.statut)+'</div>':'')
    + '<details class="more"><summary>Impact, populations, opportunité</summary><div class="grid">'
      + (it.impact?'<div><b>Impact :</b> '+esc(it.impact)+'</div>':'')
      + (it.populations?'<div><b>Populations :</b> '+esc(it.populations)+'</div>':'')
      + (it.besoin_formation?'<div><b>Besoin de formation :</b> '+esc(it.besoin_formation)+'</div>':'')
      + (it.opportunite?'<div><b>Opportunité Sabatier :</b> '+esc(it.opportunite)+'</div>':'')
    + '</div></details>'
    + '<div class="links">'
      + (it.source_url?'<a href="'+esc(it.source_url)+'" target="_blank" rel="noopener">Source : '+esc(it.source_label||"lien")+' ↗</a>':'')
      + (it.fichier?'<span class="filepath">Synthèse : '+esc(it.fichier)+'</span>':'')
    + '</div>'
  + '</div>';
}

function render(){
  // Home = uniquement les nouveautés du dernier run ; le reste est dans Archives.
  const fresh = ITEMS.filter(it => (it.ajout||it.date) === LATEST_AJOUT);
  const list = fresh.filter(matches);
  const older = ITEMS.length - fresh.length;
  document.getElementById("count").innerHTML =
      '<b>Nouveautés du '+fmtDate(LATEST_AJOUT)+'</b> — '
      + list.length + " élément" + (list.length>1?"s":"") + " affiché" + (list.length>1?"s":"")
      + (older>0 ? ' · <span class="muted-note">'+older+' élément'+(older>1?"s":"")+' plus ancien'+(older>1?"s":"")+' dans l\'onglet Archives</span>' : '');
  document.getElementById("feedlist").innerHTML = list.length ? list.map(cardHTML).join("") : '<div class="empty">Aucune nouveauté pour cette date (ajustez les filtres ou consultez les Archives).</div>';
}

function renderArchive(){
  const cont = document.getElementById("archlist");
  document.getElementById("archcount").textContent = "Archives complètes — "+ITEMS.length+" éléments répartis sur 9 agents.";
  let html = "";
  Object.entries(AGENTS).sort((a,b)=>a[1].num-b[1].num).forEach(([key,a])=>{
    const its = ITEMS.filter(i=>i.agent===key);
    html += '<details class="agentblock"'+(its.length?' open':'')+'>'
      + '<summary><span class="dot" style="width:11px;height:11px;border-radius:50%;display:inline-block;background:'+a.couleur+'"></span>'
      + a.num+'. '+esc(a.label)+'<span class="acount">'+its.length+' élément'+(its.length>1?"s":"")+'</span></summary>'
      + '<div class="inner">';
    if(!its.length){ html += '<div class="empty">Aucune actualité pour l\'instant.</div>'; }
    else {
      its.forEach(it=>{
        html += '<div class="arch-item"><div class="ai1"><span class="ai-date">'+fmtDate(it.date)+'</span>'
          + '<span class="ai-title">'+esc(it.titre)+'</span></div>'
          + '<div class="ai-res">'+esc(it.resume)+'</div></div>';
      });
    }
    html += '</div></details>';
  });
  cont.innerHTML = html;
}

render();
renderArchive();
</script>
